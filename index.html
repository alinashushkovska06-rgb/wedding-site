<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Наше весілля</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  scroll-behavior: smooth;
}

/* ГОЛОВНИЙ ЕКРАН */
.hero {
  height: 100vh;
  background: url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.scroll {
  position: absolute;
  bottom: 20px;
  font-size: 18px;
}

/* СЕКЦІЇ */
.section {
  padding: 70px 20px;
  text-align: center;
}

.light {
  background: #ffffff;
}

.dark {
  background: #f8f5f0;
}

h2 {
  font-size: 28px;
}

p {
  font-size: 18px;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- ПЕРШИЙ ЕКРАН -->
<div class="hero">
  <div>
    <h1>Олександр & Аліна 💍</h1>
    <p>24 липня 2026</p>
    <div class="scroll">↓ гортай вниз ↓</div>
  </div>
</div>

<!-- ФРАЗА -->
<div class="section light">
  <h2>💖</h2>
  <p>Кохання — це коли двоє знаходять одне одного серед тисяч</p>
</div>

<!-- ТАЙМІНГ -->
<div class="section dark">
  <h2>📅 Таймінг</h2>
  <p>
  12:45 — Вінчання ⛪<br>
  14:00 — Святкування в Айвенго 🍾
  </p>
</div>

<!-- ЛОКАЦІЯ РЕСТОРАН -->
<div class="section light">
  <h2>📍 Ресторан</h2>
  <p>Айвенго</p>
</div>

<!-- ЛОКАЦІЯ ВІНЧАННЯ -->
<div class="section dark">
  <h2>⛪ Вінчання</h2>
  <p>Тут впишеш церкву</p>
</div>

<!-- ФІНАЛ -->
<div class="section light">
  <h2>💌</h2>
  <p>Будемо щасливі розділити цей день з вами ❤️</p>
</div>

</body>
</html>
