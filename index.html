<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Наше весілля</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  text-align: center;
  background: linear-gradient(to bottom, #fff5f7, #ffffff);
  color: #333;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.date {
  font-size: 20px;
  margin-bottom: 30px;
}

.block {
  margin: 40px 0;
}

.button {
  display: inline-block;
  padding: 12px 25px;
  background: #d4af37;
  color: white;
  text-decoration: none;
  border-radius: 20px;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Олександр & Аліна 💍</h1>
<div class="date">24 липня 2026</div>

<p>Ми щасливі запросити вас на найважливіший день у нашому житті ❤️</p>

<div class="block">
<h2>📍 Локація</h2>
<p>Тут напишеш адресу</p>
</div>

<div class="block">
<h2>📅 Програма</h2>
<p>15:00 — Церемонія<br>
17:00 — Святкування</p>
</div>

<div class="block">
<h2>🎶 Наша пісня</h2>

<audio controls autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<div class="block">
<h2>💌 Підтвердження</h2>
<p>Напишіть нам, чи зможете бути ❤️</p>
</div>

</div>

</body>
</html>
